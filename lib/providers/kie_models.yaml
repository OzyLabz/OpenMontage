# Gateway model-identity map (slim System A) — kie single gateway.
# PHASE 1: confirmed slash-id models only (ride the existing kie_client via
# jobs/createTask — no new client code). Reference-field names + arities are
# transcribed from each model's docs.kie.ai page (see `source` + KIE_MODEL_CATALOG.md).
# Dedicated-endpoint models (Veo/Runway) and unconfirmed-id models (Sora/Wan/Topaz)
# are NOT here yet (Phases 2/3). Lip-sync is Phase 4 (blocked on audio).
version: "1.0"
models:

  # ---------------- IMAGE ----------------

  - canonical_id: nano-banana-pro
    gateway: kie
    kie_model: "nano-banana-pro"               # CONFIRMED: docs.kie.ai/market/google/pro-image-to-image
    capability: image_generation
    operations: [text_to_image, image_edit, identity_edit]
    category_tags: [t2i, i2i, identity-edit]
    input_fields: [prompt, image_input, aspect_ratio, resolution, output_format]
    reference_fields:
      image_input: 8                           # array of reference/input images, max 8 (Gemini 3 Pro Image)
    param_specs:
      prompt:        {type: string,  required: true,  values: "max 10000 chars"}
      image_input:   {type: array,   required: false, values: "<=8 ref imgs (jpeg/png/webp, <=30MB ea)"}
      aspect_ratio:  {type: enum,    required: false, default: "1:1", values: "1:1,2:3,3:2,3:4,4:3,4:5,5:4,9:16,16:9,21:9,auto"}
      resolution:    {type: enum,    required: false, default: "1K", values: "1K,2K,4K", cost: verify, note: "unmeasured; by nano-banana-2 analogy may be flat, NOT confirmed - verify-at-build"}
      output_format: {type: enum,    required: false, default: "png", values: "png,jpg"}
    est_cost_usd: null
    est_cost_credits: null     # TBD until measured
    cost_note: "TBD until measured"
    source: "https://docs.kie.ai/market/google/pro-image-to-image"

  - canonical_id: nano-banana-2
    gateway: kie
    kie_model: "nano-banana-2"                 # CONFIRMED: docs.kie.ai/market/google/nanobanana2
    capability: image_generation
    operations: [text_to_image, image_edit, identity_edit]
    category_tags: [t2i, i2i, identity-edit]
    input_fields: [prompt, image_input, aspect_ratio, resolution, output_format]
    reference_fields:
      image_input: 14                          # array of reference/input images, max 14 (most refs of any image model)
    param_specs:
      prompt:        {type: string,  required: true,  values: "max 20000 chars"}
      image_input:   {type: array,   required: false, values: "<=14 ref imgs (jpeg/png/webp, <=30MB ea)"}
      aspect_ratio:  {type: enum,    required: false, default: "auto", values: "1:1,1:4,1:8,2:3,3:2,3:4,4:1,4:3,4:5,5:4,8:1,9:16,16:9,21:9,auto"}
      resolution:    {type: enum,    required: false, default: "1K", values: "1K,2K,4K", cost: flat, note: "MEASURED 8cr at both 1K and 2K - controls dimensions, not price"}
      output_format: {type: enum,    required: false, default: "jpg", values: "png,jpg"}
    est_cost_usd: null
    est_cost_credits: 8        # MEASURED — flat 8 credits at BOTH 1K and 2K (16:9)
    cost_note: "8 credits — FLAT regardless of resolution (measured 8 at 2K=2752x1536 AND 1K=1376x768). resolution/output_format ARE now forwarded by kie_image; 1K is honored (1376x768, exactly half the 2K frame). Resolution controls dimensions/quality, not price."
    source: "https://docs.kie.ai/market/google/nanobanana2"

  - canonical_id: seedream-4.5
    gateway: kie
    kie_model: "seedream/4.5-text-to-image"    # CONFIRMED: docs.kie.ai/market/seedream/4-5-text-to-image
    capability: image_generation
    operations: [text_to_image]
    category_tags: [t2i]
    input_fields: [prompt, aspect_ratio, quality, nsfw_checker]
    reference_fields: {}                        # text-to-image only — no reference/input images
    defaults:
      aspect_ratio: "1:1"                        # doc-required despite default; fill to avoid 422 (cost-neutral)
      quality: "basic"                           # doc-required; basic=2K is the cost-minimal choice (agent can override to high=4K)
    param_specs:
      prompt:        {type: string,  required: true,  values: "max 3000 chars"}
      aspect_ratio:  {type: enum,    required: true,  default: "1:1", values: "1:1,4:3,3:4,16:9,9:16,2:3,3:2,21:9", note: "doc-marked 'Required field' despite default - verify-at-build if omitting 422s (multi_shots-style trap)"}
      quality:       {type: enum,    required: true,  default: "basic", values: "basic=2K,high=4K", cost: verify, note: "high=4K likely costs more - UNMEASURED; also doc-required-despite-default"}
      nsfw_checker:  {type: boolean, required: false, default: "false", values: "true,false"}
    est_cost_usd: null
    est_cost_credits: null
    cost_note: "TBD until measured"
    source: "https://docs.kie.ai/market/seedream/4-5-text-to-image"

  - canonical_id: gpt-image-2
    gateway: kie
    kie_model: "gpt-image-2-text-to-image"     # CONFIRMED: docs.kie.ai/market/gpt/gpt-image-2-text-to-image
    capability: image_generation
    operations: [text_to_image]
    category_tags: [t2i]
    input_fields: [prompt, aspect_ratio, resolution]
    reference_fields: {}                        # text-to-image variant — no reference images (edit sibling is Phase 3)
    param_specs:
      prompt:        {type: string,  required: true,  values: "max 20000 chars"}
      aspect_ratio:  {type: enum,    required: false, default: "auto", values: "auto,1:1,3:2,2:3,4:3,3:4,5:4,4:5,16:9,9:16,2:1,1:2,3:1,1:3,21:9,9:21"}
      resolution:    {type: enum,    required: false, default: "not stated", values: "1K,2K,4K", cost: verify, note: "constraints: 1:1 cannot be 4K; aspect_ratio=auto yields only 1K"}
    est_cost_usd: null
    est_cost_credits: null
    cost_note: "TBD until measured. Edit sibling gpt-image-2-image-to-image deferred to Phase 3 (verify ref fields)."
    source: "https://docs.kie.ai/market/gpt/gpt-image-2-text-to-image"

  - canonical_id: grok-image
    gateway: kie
    kie_model: "grok-imagine/text-to-image"    # CONFIRMED: docs.kie.ai/market/grok-imagine/text-to-image
    capability: image_generation
    operations: [text_to_image]
    category_tags: [t2i]
    default_for_capability: true               # cheapest + proven (first paid kie image); keep as image default
    input_fields: [prompt, aspect_ratio, enable_pro, nsfw_checker]
    reference_fields: {}                        # text-to-image only — no reference images
    param_specs:
      prompt:        {type: string,  required: true,  values: "max 5000 chars (English)"}
      aspect_ratio:  {type: enum,    required: false, default: "1:1", values: "2:3,3:2,1:1,16:9,9:16"}
      enable_pro:    {type: boolean, required: false, default: "not stated", values: "true=quality,false=speed", cost: verify, note: "measured 4cr at enable_pro=false; pro mode UNMEASURED"}
      nsfw_checker:  {type: boolean, required: false, default: "false", values: "true,false"}
    est_cost_usd: null
    est_cost_credits: 4        # MEASURED (16:9, enable_pro off -> returned 6 variants, 1280x720, ~30s)
    cost_note: "empirical ~4 credits/request; returns multiple variations"
    source: "https://docs.kie.ai/market/grok-imagine/text-to-image"

  - canonical_id: ideogram-character-edit
    gateway: kie
    kie_model: "ideogram/character-edit"       # CONFIRMED: docs.kie.ai/market/ideogram/character-edit
    capability: image_generation
    operations: [image_edit, identity_edit]
    category_tags: [i2i, identity-edit]
    input_fields: [prompt, image_url, mask_url, reference_image_urls, rendering_speed, style, expand_prompt, num_images, seed]
    reference_fields:
      reference_image_urls: 1                  # CONFIRMED: array accepts 1 only (rest ignored)
    param_specs:
      prompt:               {type: string,  required: true,  values: "max 5000 chars"}
      image_url:            {type: string,  required: true,  values: "base image to edit (jpeg/png/webp, <=10MB)"}
      mask_url:             {type: string,  required: true,  values: "inpaint mask (jpeg/png/webp, <=10MB)"}
      reference_image_urls: {type: array,   required: true,  values: "character ref - 'currently only 1 image is supported'"}
      rendering_speed:      {type: enum,    required: false, default: "BALANCED", values: "TURBO,BALANCED,QUALITY"}
      style:                {type: enum,    required: false, default: "AUTO", values: "AUTO,REALISTIC,FICTION"}
      expand_prompt:        {type: boolean, required: false, default: "true", values: "true,false"}
      num_images:           {type: enum,    required: false, default: "1", values: "1,2,3,4", note: "STRING enum per docs, NOT integer"}
      seed:                 {type: integer, required: false, default: "not stated"}
    est_cost_usd: null
    est_cost_credits: null
    cost_note: "TBD until measured. Identity lock via 1 character ref; needs base image + mask."
    source: "https://docs.kie.ai/market/ideogram/character-edit"

  - canonical_id: recraft-crisp-upscale
    gateway: kie
    kie_model: "recraft/crisp-upscale"         # CONFIRMED: docs.kie.ai/market/recraft/crisp-upscale
    capability: image_generation
    operations: [upscale]
    category_tags: [upscale]
    input_fields: [image]                       # source image URL to upscale (no prompt)
    reference_fields: {}                        # upscaler — input `image` is the source, not a reference
    param_specs:
      image: {type: string, required: true, values: "source image URL (jpeg/png/webp, <=10MB); no prompt"}
    est_cost_usd: null
    est_cost_credits: null
    cost_note: "TBD until measured. Note: no prompt; input field is `image`."
    source: "https://docs.kie.ai/market/recraft/crisp-upscale"

  # ---------------- VIDEO ----------------

  - canonical_id: seedance-2.0
    gateway: kie
    kie_model: "bytedance/seedance-2"          # CONFIRMED: docs.kie.ai/market/bytedance/seedance-2
    capability: video_generation
    operations: [text_to_video, image_to_video, reference_to_video]
    category_tags: [t2v, i2v, reference-to-video]
    default_for_capability: true               # best identity-lock + proven (first paid kie video); video default
    input_fields: [prompt, first_frame_url, last_frame_url, reference_image_urls, reference_video_urls, reference_audio_urls, generate_audio, resolution, aspect_ratio, duration, nsfw_checker, web_search]
    reference_fields:
      reference_image_urls: 9                  # CONFIRMED 9 / 3 / 3
      reference_video_urls: 3
      reference_audio_urls: 3
    param_specs:
      prompt:               {type: string,  required: true,  values: "min 3, max 20000 chars"}
      first_frame_url:      {type: string,  required: false, values: "i2v first frame (URL or asset://id)"}
      last_frame_url:       {type: string,  required: false, values: "i2v last frame (first+last mode)"}
      reference_image_urls: {type: array,   required: false, values: "<=9 (jpeg/png/webp/bmp/tiff/gif, <=30MB ea)"}
      reference_video_urls: {type: array,   required: false, values: "<=3 (mp4/mov, 2-15s ea, <=15s total, <=50MB)"}
      reference_audio_urls: {type: array,   required: false, values: "<=3 (wav/mp3, 2-15s ea, <=15MB)"}
      generate_audio:       {type: boolean, required: false, default: "true", values: "true,false", cost: "yes", note: "docs: 'enabling audio will increase the generation cost'"}
      resolution:           {type: enum,    required: false, default: "720p", values: "480p,720p,1080p", cost: "yes", note: "480p cheapest/fastest; measured 76cr at 480p/4s"}
      aspect_ratio:         {type: enum,    required: false, default: "16:9", values: "1:1,4:3,3:4,16:9,9:16,21:9,adaptive"}
      duration:             {type: integer, required: false, default: "5", values: "4-15s", cost: verify, note: "longer likely costs more - UNMEASURED"}
      nsfw_checker:         {type: boolean, required: false, default: "false", values: "true,false"}
      web_search:           {type: boolean, required: false, default: "not stated", values: "true,false", note: "'use online search'"}
      # return_last_frame: DEPRECATED per docs - intentionally omitted
    est_cost_usd: null
    est_cost_credits: 76       # MEASURED (480p / 4s / audio off)
    cost_note: "empirical 76 credits for 480p/4s; published 480p=30 figure was stale (likely Seedance 1.0)"
    source: "https://docs.kie.ai/market/bytedance/seedance-2"

  - canonical_id: kling-3.0
    gateway: kie
    kie_model: "kling-3.0/video"               # CONFIRMED: docs.kie.ai/market/kling/kling-3-0
    capability: video_generation
    operations: [text_to_video, image_to_video, reference_to_video]
    category_tags: [t2v, i2v, reference-to-video]
    input_fields: [prompt, image_urls, kling_elements, sound, duration, aspect_ratio, mode, multi_shots, multi_prompt]
    reference_fields:
      image_urls: 2                            # 1-2 first/last frame images (i2v)
      kling_elements: 3                        # up to 3 element OBJECTS; each element's element_input_urls holds 2-4 images (capture nested shape when wiring generation)
    defaults:
      multi_shots: false                       # API REQUIRES it (422 "multi_shots cannot be empty" if omitted); false = single-shot
      mode: "std"                              # doc-required; default to std (cheapest) NOT the doc's pro — cost-minimal, agent can override up
      sound: false                             # doc-required; false = no audio (cheaper, single-shot)
      duration: 5                              # doc-required; 5s (proven in the 70cr measured run)
      aspect_ratio: "16:9"                     # doc-required for t2v (optional w/ image_urls — auto-adapts); cost-neutral
    param_specs:
      prompt:         {type: string,  required: true,  values: "takes effect when multi_shots=false"}
      mode:           {type: enum,    required: true,  default: "pro", values: "std,pro,4K", cost: "yes", note: "doc default=pro; pass std to minimize spend (measured 70cr std/5s); 4K 'consume more credits'"}
      duration:       {type: enum,    required: true,  default: "5", values: "3-15s (integer as string)", cost: verify}
      aspect_ratio:   {type: enum,    required: true,  default: "16:9", values: "16:9,9:16,1:1", note: "optional when image_urls provided (auto-adapts)"}
      sound:          {type: boolean, required: true,  default: "false", values: "true,false", cost: verify, note: "defaults true when multi_shots=true"}
      multi_shots:    {type: boolean, required: true,  default: "false", values: "true,false", note: "handled by defaults: block; 422 if omitted"}
      multi_prompt:   {type: array,   required: false, values: "ARRAY OF OBJECTS {prompt(<=500 chars), duration(1-12s)}, <=5 shots; required WHEN multi_shots=true"}
      image_urls:     {type: array,   required: false, values: "1-2 first/last frame (jpg/png, <=10MB); required when @element_name used in prompt"}
      kling_elements: {type: array,   required: false, values: "<=3 element OBJECTS, each: name + description + 2-4 image URLs"}
    est_cost_usd: null
    est_cost_credits: 70       # MEASURED (std mode / 5s / sound off -> 720p, video-only)
    cost_note: "70 credits for std/5s/no-audio (output 1280x720, no audio stream). mode/sound forward correctly through kie_video (verified on the wire). NOTE: kling-3.0 REQUIRES multi_shots — omitting it returns `422 multi_shots cannot be empty`; pass multi_shots=false for a single-shot clip. image_urls = first/last frame (i2v); kling_elements = identity/element refs."
    source: "https://docs.kie.ai/market/kling/kling-3-0"

  - canonical_id: kling-2.6-motion-control
    gateway: kie
    kie_model: "kling-2.6/motion-control"      # CONFIRMED: docs.kie.ai/market/kling/motion-control
    capability: video_generation
    operations: [motion_control]
    category_tags: [motion-control]
    input_fields: [prompt, input_urls, video_urls, character_orientation, mode]
    reference_fields:
      input_urls: 1                            # 1 character photo (head/shoulders/torso visible)
      video_urls: 1                            # 1 driving motion video (3-30s)
    param_specs:
      prompt:                {type: string, required: false, values: "max 2500 chars (OPTIONAL here)"}
      input_urls:            {type: array,  required: true,  values: "1 character image (jpeg/png/jpg, <=10MB, >300px, AR 2:5-5:2)"}
      video_urls:            {type: array,  required: true,  values: "1 driving video (mp4/mov/mkv, <=100MB, 3-30s)"}
      character_orientation: {type: enum,   required: true,  default: "video", values: "image,video"}
      mode:                  {type: enum,   required: true,  default: "720p", values: "720p,1080p", cost: verify}
      # NOTE: requires file-upload API first; max 1 image + 1 video per request

  # ---------------- VIDEO (dedicated endpoints — Phase 2) ----------------

  - canonical_id: veo-3.1
    gateway: kie
    kie_model: "veo3.1"                         # human label only — dedicated rows route by `endpoint`, not a slash-id
    endpoint: veo                               # DEDICATED: POST /api/v1/veo/generate -> GET /api/v1/veo/record-info (successFlag int / resultUrls stringified)
    capability: video_generation
    operations: [text_to_video, image_to_video, reference_to_video]
    category_tags: [t2v, i2v, reference-to-video]
    input_fields: [prompt, imageUrls, model, generationType, aspectRatio, resolution, duration, watermark, enableTranslation]
    reference_fields:
      imageUrls: 3                              # REFERENCE_2_VIDEO: 1-3; FIRST_AND_LAST_FRAMES_2_VIDEO: 1-2
    field_aliases:
      model: veo_model                          # wire body `model` (tier) reads from caller `veo_model` (tool `model` selects the row)
      aspectRatio: aspect_ratio                 # wire is camelCase `aspectRatio` (confirmed via live paramJson); caller still passes `aspect_ratio`
    defaults:
      model: "veo3_fast"                        # cost/speed tier (veo3_lite cheapest, veo3 highest fidelity); agent can override via veo_model
      resolution: "720p"                        # cost-minimal (4k ~2x credits)
    param_specs:
      prompt:            {type: string,  required: true,  cost: "yes"}
      imageUrls:         {type: array,   required: false, values: "1-3 URLs (REFERENCE_2_VIDEO); 1-2 for first/last frame"}
      model:             {type: enum,    required: false, default: "veo3_fast", values: "veo3,veo3_fast,veo3_lite", cost: "yes", note: "quality/speed/cost tiers; veo3_lite cheapest. Caller passes via veo_model (field_aliases)"}
      generationType:    {type: enum,    required: false, default: "auto-determined", values: "TEXT_2_VIDEO,FIRST_AND_LAST_FRAMES_2_VIDEO,REFERENCE_2_VIDEO", note: "auto-inferred from inputs if omitted - verify-at-build whether explicit needed for i2v/reference"}
      aspectRatio:       {type: enum,    required: false, default: "16:9", values: "16:9,9:16,Auto", note: "wire key is camelCase aspectRatio (confirmed via live paramJson); caller passes aspect_ratio (aliased). API default 16:9 — not force-defaulted"}
      resolution:        {type: enum,    required: false, default: "720p", values: "720p,1080p,4k", cost: "yes", note: "4k ~2x credits per docs"}
      duration:          {type: enum,    required: false, default: "8", values: "4,6,8", cost: "yes", note: "doc default 8 (priciest); pass 4 for cheap runs"}
      watermark:         {type: string,  required: false}
      enableTranslation: {type: boolean, required: false, default: "false", note: "live run showed the API stored enableTranslation=true when omitted — API-side default differs from doc; set explicitly to control"}
      # callBackUrl omitted (synchronous polling); enableFallback deprecated - excluded
    est_cost_usd: null
    est_cost_credits: 30       # MEASURED (veo3_lite / 720p / 4s t2v) via /chat/credit delta
    cost_note: "30 credits MEASURED for veo3_lite/720p/4s t2v (wall-clock ~62s, output had audio). Cost driven by model tier (veo3/veo3_fast/veo3_lite), resolution (4k ~2x), duration (4/6/8)."
    source: "https://docs.kie.ai/veo3-api/generate-veo-3-video"

  - canonical_id: runway-gen4-turbo
    gateway: kie
    kie_model: "runway-gen4-turbo"             # human label only — dedicated rows route by `endpoint`
    endpoint: runway                            # DEDICATED: POST /api/v1/runway/generate -> GET /api/v1/runway/record-detail (state str / videoInfo.videoUrl)
    capability: video_generation
    operations: [image_to_video, text_to_video]
    category_tags: [i2v, t2v]
    input_fields: [prompt, imageUrl, duration, quality, aspectRatio, waterMark, callBackUrl]
    reference_fields: {}                        # imageUrl is a single scalar source (not a ref array)
    field_aliases:
      aspectRatio: aspect_ratio                 # wire camelCase; caller passes aspect_ratio
    defaults:
      duration: 5                               # REQUIRED; 5s cost-minimal (10s blocks 1080p)
      quality: "720p"                            # REQUIRED; 720p cost-minimal (1080p blocks 10s)
      aspectRatio: "16:9"                       # required for text-only (ignored when imageUrl given); cost-neutral
    param_specs:
      prompt:      {type: string,  required: true,  values: "max 1800 chars", cost: "yes"}
      imageUrl:    {type: string,  required: false, values: "i2v source image URL", cost: "yes"}
      duration:    {type: enum,    required: true,  default: "5", values: "5,10", cost: "yes", note: "10s blocks 1080p"}
      quality:     {type: enum,    required: true,  default: "720p", values: "720p,1080p", cost: "yes", note: "1080p blocks 10s"}
      aspectRatio: {type: enum,    required: false, default: "16:9", values: "16:9,4:3,1:1,3:4,9:16", note: "required for text-only; ignored when imageUrl given; caller passes aspect_ratio (aliased)"}
      waterMark:   {type: string,  required: false}
      callBackUrl: {type: string,  required: false, note: "docs say 'required for all requests' but CONFIRMED optional — synchronous polling works without it"}
    est_cost_usd: null
    est_cost_credits: 12       # MEASURED (i2v / 720p / 5s) via /chat/credit delta
    cost_note: "12 credits MEASURED for i2v/720p/5s (wall-clock ~164s, NO audio stream — Gen-4 Turbo is silent). Flags resolved live: callBackUrl NOT required for sync polling; result is at videoInfo.videoUrl (state=success). aspectRatio is ignored for i2v — output adopts the source image's ratio (a 512x512 source yielded 960x960). Cost driven by quality (720p/1080p) and duration (5/10)."
    source: "https://docs.kie.ai/runway-api/generate-ai-video"

  - canonical_id: runway-aleph
    gateway: kie
    kie_model: "runway-aleph"                  # human label only — dedicated rows route by `endpoint`
    endpoint: aleph                             # DEDICATED: POST /api/v1/aleph/generate -> GET /api/v1/aleph/record-info (successFlag int / response.resultVideoUrl) — doc-confirmed shape
    capability: video_generation
    operations: [video_to_video]
    category_tags: [v2v]
    input_fields: [prompt, videoUrl, aspectRatio, seed, referenceImage, waterMark, uploadCn, callBackUrl]
    reference_fields: {}                        # videoUrl + referenceImage are single scalars (not ref arrays)
    field_aliases:
      aspectRatio: aspect_ratio                 # wire camelCase; caller passes aspect_ratio
    defaults: {}                                # no resolution/duration/quality knobs — output follows the source video; nothing cost-minimal to force
    param_specs:
      prompt:         {type: string,  required: true,  values: "guides the v2v edit/restyle/relight", cost: "yes"}
      videoUrl:       {type: string,  required: true,  values: "source video URL for v2v"}
      aspectRatio:    {type: enum,    required: false, values: "16:9,9:16,4:3,3:4,1:1,21:9", note: "caller passes aspect_ratio (aliased); output may follow source"}
      seed:           {type: integer, required: false, note: "reproducible generation"}
      referenceImage: {type: string,  required: false, values: "reference image URL to influence style/content"}
      waterMark:      {type: string,  required: false, values: "empty = no watermark"}
      uploadCn:       {type: boolean, required: false, default: "false", note: "false=S3/R2 storage, true=Alibaba OSS"}
      callBackUrl:    {type: string,  required: false, note: "optional — sync polling works without it (per Gen-4 finding)"}
